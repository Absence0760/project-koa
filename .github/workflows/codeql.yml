name: CodeQL

# Static analysis of our own code. Complements .github/workflows/audit.yml
# (which only catches known CVEs in dependencies). CodeQL finds vulnerabilities
# in code we write — XSS sinks, prototype pollution, SSRF, hard-coded secrets,
# unsafe deserialisation, etc. — and (separate language) workflow-injection
# sinks in the GitHub Actions YAML itself. Results land in the repo's
# Security tab under "Code scanning alerts".
#
# Triggers:
#   - pull_request to main: gate new code on a clean scan
#   - push to main: scan post-merge state, refresh the Security-tab baseline
#   - weekly cron (Sunday 06:00 UTC): catch new CodeQL queries flagging
#     existing code without waiting for a PR. Offset by ~24h from audit.yml /
#     gitleaks / scorecard (Monday 06:00 UTC) so the scans don't compete for
#     hosted-runner scheduler slots.
#   - workflow_dispatch: ad-hoc manual runs

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

concurrency:
  # Workflow-level grouping cancels both matrix legs together when a new
  # commit lands on the same ref — that's the desired behaviour
  # (no point analysing the stale SHA). `matrix.language` can't be
  # referenced at workflow level (job context only), and per-language
  # grouping isn't worth the complexity here.
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

# Workflow-level permission is the least-privilege baseline; the analyze
# job below requests the additional scopes it actually needs. Per
# Scorecard Token-Permissions guidance: prefer per-job permission blocks
# over a single elevated top-level set.
permissions: read-all

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      # SARIF upload requires `security-events: write` for the
      # analyze step to publish findings into the Security tab.
      security-events: write
      # `actions: read` is needed by the analyze step's workflow-run
      # lookup (without it the action errors with "Resource not
      # accessible by integration" even when analysis itself succeeded).
      actions: read
    strategy:
      fail-fast: false
      matrix:
        # javascript-typescript covers backend (Hono), frontend (SvelteKit),
        # studio (<CMS> / React). The extractor picks up .ts, .js, .svelte,
        # and .tsx automatically.
        #
        # actions covers every workflow under .github/workflows/. The query
        # set flags untrusted-input → shell-script injection (e.g. PR title
        # interpolated into a `run:` block), unpinned action references,
        # and a handful of other GHA-specific sinks. Cheap to run — adds
        # ~30s to the matrix.
        language: [javascript-typescript, actions]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          languages: ${{ matrix.language }}
          # No compile step — both languages are interpreted. Skips the
          # autobuild tracer and shaves a few minutes off each run.
          build-mode: none
          # security-and-quality is the broadest of the three suites
          # (security < security-extended < security-and-quality). For a
          # small codebase the extra noise is manageable and the
          # maintainability/correctness queries are useful. The `actions`
          # language only ships a `security-extended` ceiling; CodeQL
          # silently falls back to that when security-and-quality isn't
          # available — no per-language branching required.
          queries: security-and-quality

      - name: Perform analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          category: '/language:${{ matrix.language }}'
