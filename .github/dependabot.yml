version: 2

updates:
  # GitHub Actions used in workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]

  # Adjust or duplicate these per template's actual ecosystems.
  # Each template branch should leave the ones it needs and remove the rest.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: terraform
    directory: "/infra"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
